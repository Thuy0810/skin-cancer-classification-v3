project_name: "HAM10000 Skin Cancer Classification"
seed: 42

paths:
  raw_dir: "data/raw"
  interim_dir: "data/interim"
  processed_dir: "data/processed"
  metadata_file: "data/raw/HAM10000_metadata.csv"
  model_dir: "models/b3_bs8_gamma1_no_sampler_wd5e4"
  report_dir: "reports/b3_bs8_gamma1_no_sampler_wd5e4"
  best_model_path: "models/b3_bs8_gamma1_no_sampler_wd5e4/best_model.pth"

labels:
  label_names: ["akiec", "bcc", "bkl", "df", "mel", "nv", "vasc"]
  malignant_labels: ["akiec", "bcc", "mel"]

data:
  image_size: 300
  test_size: 0.15
  val_size: 0.15
  num_workers: 2
  pin_memory: true
  image_extensions: [".jpg", ".jpeg", ".png"]

model:
  name: "efficientnet_b3"
  pretrained: true
  num_classes: 7

training:
  epochs: 50
  batch_size: 8
  mixed_precision: true
  early_stopping_patience: 7
  monitor_metric: "macro_f1"
  device: "auto"
  save_best_only: true

optimizer:
  name: "adamw"
  learning_rate: 0.0001
  weight_decay: 0.0005

scheduler:
  name: "cosine"

loss:
  name: "focal_loss"
  gamma: 1.0
  alpha: "balanced"

mlflow:
  enabled: true
  tracking_uri: "http://<server-ip>:5000"
  experiment_name: "ham10000-efficientnet"
  run_name: "b3_bs8_gamma1_lr3e5_no_sampler_wd5e4"

augmentation:
  horizontal_flip_p: 0.5
  vertical_flip_p: 0.2
  rotate_limit: 20
  brightness_contrast_p: 0.4
  shift_scale_rotate_p: 0.4

inference:
  top_k: 3